<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>
<meta name="description">
<link rel="stylesheet" href="alif.css">
</head>

<body>

<header class="header">
  <div class="container header-content">
    <a class="logo" id="logo"></a>
    <nav class="nav-desktop" id="nav"></nav>
  </div>
</header>

<main>

<section class="hero">
  <div class="container hero-content">
    <p class="hero-subtitle" id="heroSubtitle"></p>
    <h1 class="hero-title" id="heroTitle"></h1>
    <p class="hero-description" id="heroDesc"></p>
    <div class="hero-buttons" id="heroBtns"></div>
  </div>
</section>

<section id="about" class="about">
  <div class="container about-grid">
    <div id="aboutContent"></div>
    <div>
      <div class="stats-grid" id="stats"></div>
      <div class="tech-card">
        <h3 id="techTitle"></h3>
        <div class="tech-tags" id="techTags"></div>
      </div>
    </div>
  </div>
</section>

<section id="education" class="about">
  <div class="container" id="education"></div>
</section>

<section id="projects" class="projects">
  <div class="container">
    <div class="section-header" id="projectHeader"></div>
    <div class="projects-grid" id="projects"></div>
  </div>
</section>

<section id="skills" class="skills">
  <div class="container">
    <div class="section-header" id="skillsHeader"></div>
    <div class="skills-grid" id="skills"></div>
  </div>
</section>

<section id="contact" class="contact">
  <div class="container contact-grid" id="contact"></div>
</section>

</main>

<footer class="footer">
  <div class="container footer-content" id="footer"></div>
</footer>

<script src="script.js"></script>
</body>
</html>
