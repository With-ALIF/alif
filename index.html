<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <meta name="description" content="">
  <link rel="stylesheet" href="alif.css">
</head>

<body>

<header class="header">
  <div class="container header-content">
    <a class="logo" id="logo"></a>
    <button id="menuBtn">☰</button>
    <nav id="nav"></nav>

  </div>
</header>

<main>

<section class="hero" id="home">
  <div class="container hero-content">
    <p class="hero-subtitle" id="heroSubtitle"></p>
    <h1 class="hero-title" id="heroTitle"></h1>
    <p class="hero-description" id="heroDesc"></p>
    <div class="hero-buttons" id="heroBtns"></div>
  </div>
</section>

<section id="about">
  <div class="container about-grid">
    <div id="aboutContent"></div>
    <div>
      <div id="stats"></div>
      <div class="tech-card">
        <h3 id="techTitle"></h3>
        <div class="tech-tags" id="techTags"></div>
      </div>
    </div>
  </div>
</section>

<section id="education-section">
  <div class="container">
    <div id="education"></div>
  </div>
</section>

<section id="experience-section">
  <div class="container">
    <div id="experienceHeader"></div>
    <div id="experienceContainer"></div>
  </div>
</section>


<section id="projects-section">
  <div class="container">
    <div id="projectHeader"></div>
    <div id="projectsContainer"></div>
  </div>
</section>

<section id="skills-section">
  <div class="container">
    <div id="skillsHeader"></div>
    <div id="skillsContainer"></div>
  </div>
</section>

<section id="contact-section">
  <div class="container">
    <div id="contact"></div>
  </div>
</section>

</main>

<footer class="footer">
  <div class="container footer-content" id="footer"></div>
</footer>

<script src="script.js"></script>
</body>
</html>
